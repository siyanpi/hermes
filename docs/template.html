<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>应天周报 · 抗衰老情报 | 无限极延衰领域</title>
<meta name="description" content="每周抗衰老情报：学术前沿、产业进展、AI交叉、AI应用、延衰健食竞对、延衰美妆竞对、女性健康竞对。无限极延衰领域知识库。">
<style>
:root {--bg:#0f1117;--card-bg:#1a1d27;--text:#e4e6eb;--text-secondary:#b0b3b8;--border:#2d3142;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);line-height:1.7;min-height:100vh}
.hero{text-align:center;padding:50px 20px 40px;background:linear-gradient(180deg,#1a1d27 0%,var(--bg) 100%);border-bottom:1px solid var(--border)}
.hero h1{font-size:2.2em;font-weight:800;background:linear-gradient(135deg,#667eea,#11998e,#f5576c,#fa709a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero .subtitle{color:var(--text-secondary);font-size:1.05em;margin-top:8px}
.hero .date-badge{display:inline-block;margin-top:14px;padding:6px 18px;background:var(--card-bg);border:1px solid var(--border);border-radius:20px;font-size:.9em;color:var(--text-secondary)}
.section-title{max-width:1100px;margin:40px auto 20px;padding:0 24px;font-size:1.3em;color:var(--text);font-weight:700}
.section-title span{font-size:.8em;color:var(--text-secondary);margin-left:8px}
.cards{max-width:1100px;margin:0 auto 30px;padding:0 24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
@media(max-width:900px){.cards{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.cards{grid-template-columns:1fr}}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:16px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(0,0,0,.4)}
.card-header{display:flex;align-items:center;gap:12px;padding:20px 20px 14px;color:#fff}
.card-icon{font-size:2em}
.card-title{font-size:1.15em;font-weight:700}
.card-subtitle{font-size:.8em;opacity:.85;margin-top:2px}
.card-body{padding:0 20px 16px;color:var(--text-secondary);font-size:.88em;flex:1}
.card-footer{padding:10px 20px;border-top:1px solid var(--border);text-align:center;color:#667eea;font-weight:600;font-size:.9em;transition:background .2s}
.card:hover .card-footer{background:#252836}
.archive-section{max-width:1100px;margin:40px auto;padding:0 24px 60px}
.archive-section h2{font-size:1.3em;margin-bottom:20px;color:var(--text)}
.archive-inner{padding:24px 28px;background:var(--card-bg);border:1px solid var(--border);border-radius:16px}
.archive-tools{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.archive-tools input,.archive-tools select{padding:8px 14px;background:#252836;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.9em}
.archive-tools input{flex:1;min-width:200px}
.archive-tools select{min-width:120px}
.arch-grid{display:flex;flex-direction:column;gap:4px}
.arch-item{display:flex;align-items:center;gap:10px;padding:6px 10px;border-radius:6px;transition:background .2s}
.arch-item:hover{background:#252836}
.arch-item a{color:#667eea;text-decoration:none;flex:1}
.arch-item a:hover{text-decoration:underline}
.arch-week-tag{font-size:.78em;color:#8b8fa3;min-width:70px}
.arch-mod-tag{font-size:.75em;padding:2px 8px;background:#1a1d27;border-radius:4px;color:var(--text-secondary);min-width:42px;text-align:center}
.empty{color:var(--text-secondary);font-style:italic}
.footer{text-align:center;padding:30px;color:var(--text-secondary);font-size:.85em;border-top:1px solid var(--border)}
</style>
</head>
<body>
<header class="hero">
<h1>应天周报 · 抗衰老情报</h1>
<p class="subtitle">无限极延衰领域 · 学术 + 产业 + AI + 竞对 · 每周自动更新</p>
<div class="date-badge">📅 {{date}} · {{week}}</div>
</header>
<div class="section-title">📊 行业情报 <span>学术 · 产业 · AI</span></div>
<div class="cards"><!-- academic_card --><!-- industry_card --><!-- ai_aging_card --><!-- ai_apps_card --></div>
<div class="section-title">🔍 竞对追踪 <span>健食 · 美妆 · 女性健康</span></div>
<div class="cards"><!-- competitor_food_card --><!-- competitor_beauty_card --><!-- competitor_women_card --></div>
<div class="archive-section"><h2>📚 往期归档</h2><div class="archive-inner"><!-- archive --></div></div>
<footer class="footer"><p>应天AI研发系统 · 无限极全球科研中心 | 自动生成于 {{date}}</p><p style="margin-top:4px;font-size:.8em">基于 PubMed · Web · arXiv 公开信息 | 仅供研究参考</p></footer>
<script>
function filterArchive(){var s=document.getElementById('arch-search').value.toLowerCase();var m=document.getElementById('arch-module').value;var items=document.querySelectorAll('.arch-item');var found=0;items.forEach(function(el){var title=el.dataset.title.toLowerCase();var mod=el.dataset.module;var week=el.dataset.week;var match=(!s||title.includes(s)||week.includes(s))&&(!m||mod===m);el.style.display=match?'flex':'none';if(match)found++});document.getElementById('arch-empty').style.display=found?'none':'block'}
</script>
</body>
</html>
