<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>应天周报 · 抗衰老情报 | 无限极延衰领域</title>
<meta name="description" content="每周抗衰老学术前沿、产业进展、AI交叉与AI应用落地情报。无限极延衰领域知识库。">
<style>
:root {
  --bg: #0f1117;
  --card-bg: #1a1d27;
  --text: #e4e6eb;
  --text-secondary: #b0b3b8;
  --border: #2d3142;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
}

.hero {
  text-align: center;
  padding: 60px 20px 50px;
  background: linear-gradient(180deg, #1a1d27 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
}
.hero h1 {
  font-size: 2.2em;
  font-weight: 800;
  background: linear-gradient(135deg, #667eea, #11998e, #f5576c, #fa709a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero .subtitle { color: var(--text-secondary); font-size: 1.1em; margin-top: 10px; }
.hero .date-badge {
  display: inline-block; margin-top: 16px; padding: 6px 18px;
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 20px; font-size: 0.9em; color: var(--text-secondary);
}

/* Card grid */
.cards {
  max-width: 1100px; margin: 40px auto; padding: 0 24px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 28px;
}
@media (max-width: 700px) {
  .cards { grid-template-columns: 1fr; }
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
  text-decoration: none;
  color: inherit;
  transition: transform 0.2s, box-shadow 0.2s;
  display: flex;
  flex-direction: column;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.card-header {
  display: flex; align-items: center; gap: 16px;
  padding: 28px 28px 20px; color: #fff;
}
.card-icon { font-size: 2.5em; }
.card-title { font-size: 1.4em; font-weight: 700; }
.card-subtitle { font-size: 0.9em; opacity: 0.85; margin-top: 4px; }
.card-body {
  padding: 0 28px 28px; flex: 1;
  color: var(--text-secondary); font-size: 0.95em;
}
.card-footer {
  padding: 14px 28px; border-top: 1px solid var(--border);
  text-align: center; color: #667eea; font-weight: 600;
  font-size: 0.95em; transition: background 0.2s;
}
.card:hover .card-footer { background: #252836; }

/* Archive */
.archive-section {
  max-width: 1100px; margin: 40px auto; padding: 30px 28px 60px;
}
.archive-section h2 {
  font-size: 1.5em; margin-bottom: 20px; color: var(--text);
  padding: 0 24px;
}
.archive-inner {
  padding: 30px 28px;
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px;
}
.archive-week h4 { color: var(--text-secondary); font-size: 1em; margin: 12px 0 6px; }
.archive-week ul { list-style: none; padding-left: 12px; }
.archive-week li { padding: 3px 0; }
.archive-week a { color: #667eea; text-decoration: none; font-size: 0.93em; }
.archive-week a:hover { text-decoration: underline; }
.empty { color: var(--text-secondary); font-style: italic; }

.footer {
  text-align: center; padding: 30px; color: var(--text-secondary);
  font-size: 0.85em; border-top: 1px solid var(--border);
}
</style>
</head>
<body>

<header class="hero">
  <h1>应天周报 · 抗衰老情报</h1>
  <p class="subtitle">无限极延衰领域 · 每周学术 + 产业 + AI · 自动更新</p>
  <div class="date-badge">📅 {{date}} · {{week}}</div>
</header>

<div class="cards">

  <!-- academic_card -->
  <!-- industry_card -->
  <!-- ai_aging_card -->
  <!-- ai_apps_card -->

</div>

<div class="archive-section">
  <h2>📚 往期归档</h2>
  <div class="archive-inner">
    <!-- archive -->
  </div>
</div>

<footer class="footer">
  <p>应天AI研发系统 · 无限极全球科研中心 | 自动生成于 {{date}}</p>
  <p style="margin-top:4px;font-size:0.8em;">基于 PubMed · Web · arXiv 公开信息 | 仅供研究参考</p>
</footer>

</body>
</html>
