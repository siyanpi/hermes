<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>应天周报 · 抗衰老情报 | 无限极延衰领域</title>
<meta name="description" content="每周抗衰老学术前沿、产业进展、AI交叉与AI应用落地情报。无限极延衰领域知识库。">
<style>
:root {
  --bg: #0f1117;
  --card-bg: #1a1d27;
  --text: #e4e6eb;
  --text-secondary: #b0b3b8;
  --border: #2d3142;
  --highlight: #f0c040;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
}

.hero {
  text-align: center;
  padding: 50px 20px 36px;
  background: linear-gradient(180deg, #1a1d27 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
}
.hero h1 {
  font-size: 2.2em;
  font-weight: 800;
  background: linear-gradient(135deg, #667eea, #11998e, #f5576c, #fa709a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero .subtitle { color: var(--text-secondary); font-size: 1.05em; margin-top: 8px; }
.hero .date-badge {
  display: inline-block; margin-top: 14px; padding: 6px 18px;
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 20px; font-size: 0.9em; color: var(--text-secondary);
}

/* Tabs */
.tabs {
  display: flex; justify-content: center; gap: 8px;
  padding: 20px 24px 0; max-width: 1200px; margin: 0 auto;
  flex-wrap: wrap;
}
.tab {
  padding: 10px 20px; border-radius: 10px 10px 0 0;
  border: 1px solid transparent; border-bottom: none;
  cursor: pointer; font-size: 0.95em; font-weight: 600;
  color: var(--text-secondary); background: transparent;
  transition: all 0.2s;
}
.tab:hover { color: #fff; background: #252836; }
.tab.active { color: #fff; background: var(--card-bg); border-color: var(--border); }

.container { max-width: 1200px; margin: 0 auto; padding: 0 24px 60px; }

/* Module Card */
.module-card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 0 16px 16px 16px; overflow: hidden; margin-bottom: 40px;
  transition: box-shadow 0.3s;
}
.module-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
.module-header {
  display: flex; align-items: center; gap: 16px;
  padding: 22px 28px; color: #fff;
}
.module-icon { font-size: 2em; }
.module-title-group h2 { font-size: 1.35em; font-weight: 700; margin: 0; }
.module-subtitle { font-size: 0.85em; opacity: 0.85; }
.module-body { padding: 20px 28px 28px; }

/* Full report link */
.full-report-link {
  display: inline-block; padding: 8px 18px; margin-bottom: 18px;
  background: #252836; border: 1px solid var(--border);
  border-radius: 8px; color: #667eea; text-decoration: none;
  font-size: 0.9em; font-weight: 600; transition: all 0.2s;
}
.full-report-link:hover { background: #2d3142; color: #8b9cf7; }

/* Sections & Items */
.section h3 {
  font-size: 1.15em; color: var(--highlight); margin: 24px 0 14px;
  padding-left: 12px; border-left: 3px solid var(--highlight);
}
.section:first-child h3 { margin-top: 0; }
.item {
  background: #252836; border-radius: 10px; padding: 16px 20px;
  margin-bottom: 14px; border: 1px solid transparent;
  transition: border-color 0.2s;
}
.item:hover { border-color: var(--border); }
.item h4 { font-size: 1em; color: #e4e6eb; margin-bottom: 8px; line-height: 1.5; }
.item h4 a { color: #8b9cf7; }
.item .body p { font-size: 0.93em; color: var(--text-secondary); margin-bottom: 6px; line-height: 1.65; }

/* Source links */
a.source-link {
  color: #667eea; text-decoration: none;
  border-bottom: 1px dotted #667eea;
}
a.source-link:hover { color: #8b9cf7; border-color: #8b9cf7; }
span.source-ref {
  color: #8b8fa3; font-size: 0.85em;
}
span.source-ref a {
  color: #667eea; text-decoration: none;
}
span.source-ref a:hover { text-decoration: underline; }

/* Archive */
.archive-section {
  margin-top: 40px; padding: 30px 28px;
  background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px;
}
.archive-section h2 { font-size: 1.5em; margin-bottom: 20px; color: var(--text); }
.archive-week h4 { color: var(--text-secondary); font-size: 1em; margin: 12px 0 6px; }
.archive-week ul { list-style: none; padding-left: 12px; }
.archive-week li { padding: 3px 0; }
.archive-week a { color: #667eea; text-decoration: none; font-size: 0.93em; }
.archive-week a:hover { text-decoration: underline; }
.empty { color: var(--text-secondary); font-style: italic; }

.footer {
  text-align: center; padding: 30px; color: var(--text-secondary);
  font-size: 0.85em; border-top: 1px solid var(--border); margin-top: 40px;
}

@media (max-width: 768px) {
  .hero h1 { font-size: 1.5em; }
  .module-header { flex-direction: column; text-align: center; padding: 18px; }
  .module-body { padding: 14px; }
  .item { padding: 12px 14px; }
  .container { padding: 0 12px 40px; }
  .tab { padding: 8px 14px; font-size: 0.85em; }
}
</style>
</head>
<body>

<header class="hero">
  <h1>应天周报 · 抗衰老情报</h1>
  <p class="subtitle">无限极延衰领域 · 每周学术 + 产业 + AI · 自动更新</p>
  <div class="date-badge">📅 {{date}} · {{week}}</div>
</header>

<!-- Tab Navigation -->
<div class="tabs">
  <button class="tab active" onclick="switchTab(event, 'academic')">🔬 学术前沿</button>
  <button class="tab" onclick="switchTab(event, 'industry')">🏭 产业进展</button>
  <button class="tab" onclick="switchTab(event, 'ai_aging')">🤖 AI×抗衰老</button>
  <button class="tab" onclick="switchTab(event, 'ai_apps')">⚡ AI应用落地</button>
</div>

<div class="container">

  <!-- Module 1: Academic -->
  <!-- academic_module -->

  <!-- Module 2: Industry -->
  <!-- industry_module -->

  <!-- Module 3: AI × Aging -->
  <!-- ai_aging_module -->

  <!-- Module 4: AI Apps -->
  <!-- ai_apps_module -->

  <!-- Archive -->
  <div class="archive-section">
    <h2>📚 往期归档</h2>
    <!-- archive -->
  </div>

</div>

<footer class="footer">
  <p>应天AI研发系统 · 无限极全球科研中心 | 自动生成于 {{date}}</p>
  <p style="margin-top:4px;font-size:0.8em;">基于 PubMed · Web · arXiv 公开信息 | 仅供研究参考</p>
</footer>

<script>
function switchTab(evt, name) {
  document.querySelectorAll('.module-card').forEach(function(c) { c.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  var card = document.getElementById(name);
  if (card) card.classList.add('active');
  if (evt && evt.target) evt.target.classList.add('active');
}
// Show first module by default
document.addEventListener('DOMContentLoaded', function() {
  var first = document.querySelector('.module-card');
  if (first) first.classList.add('active');
});
</script>

</body>
</html>
