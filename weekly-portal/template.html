<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>应天周报 · 抗衰老情报 | 无限极延衰领域</title>
<meta name="description" content="每周抗衰老学术前沿、产业进展与AI交叉情报，覆盖中草药、药物、食品、化妆品、检测工具。无限极延衰领域知识库。">
<style>
:root {
  --bg: #0f1117;
  --card-bg: #1a1d27;
  --text: #e4e6eb;
  --text-secondary: #b0b3b8;
  --border: #2d3142;
  --accent-1: #667eea;
  --accent-2: #11998e;
  --accent-3: #f5576c;
  --highlight: #f0c040;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  min-height: 100vh;
}

/* Header */
.hero {
  text-align: center;
  padding: 60px 20px 40px;
  background: linear-gradient(180deg, #1a1d27 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
}
.hero h1 {
  font-size: 2.2em;
  font-weight: 800;
  background: linear-gradient(135deg, #667eea, #11998e, #f5576c);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hero .subtitle {
  color: var(--text-secondary);
  font-size: 1.05em;
  margin-top: 10px;
}
.hero .date-badge {
  display: inline-block;
  margin-top: 16px;
  padding: 6px 18px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 0.9em;
  color: var(--text-secondary);
}

/* Container */
.container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px 24px 60px;
}

/* Module Card */
.module-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 32px;
  transition: box-shadow 0.3s;
}
.module-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
.module-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 24px 28px;
  color: #fff;
}
.module-icon { font-size: 2em; }
.module-title-group h2 { font-size: 1.4em; font-weight: 700; margin: 0; }
.module-subtitle { font-size: 0.9em; opacity: 0.85; }
.module-body { padding: 24px 28px; }

/* Sections & Items */
.section h3 {
  font-size: 1.1em;
  color: var(--highlight);
  margin: 24px 0 14px;
  padding-left: 12px;
  border-left: 3px solid var(--highlight);
}
.section:first-child h3 { margin-top: 0; }
.item {
  background: #252836;
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 12px;
  border: 1px solid transparent;
  transition: border-color 0.2s;
}
.item:hover { border-color: var(--border); }
.item h4 {
  font-size: 1em;
  color: #e4e6eb;
  margin-bottom: 8px;
}
.item .body p, .item .body li {
  font-size: 0.93em;
  color: var(--text-secondary);
  margin-bottom: 4px;
}
.item .body ul { padding-left: 16px; }
.meta-row { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
.meta {
  display: inline-block;
  padding: 2px 10px;
  background: #1a1d27;
  border-radius: 4px;
  font-size: 0.82em;
  color: #8b8fa3;
}
.source-link {
  display: inline-block;
  margin-top: 8px;
  font-size: 0.85em;
  color: #667eea;
  text-decoration: none;
}
.source-link:hover { text-decoration: underline; }

/* Archive */
.archive-section {
  margin-top: 50px;
  padding: 30px 28px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 16px;
}
.archive-section h2 {
  font-size: 1.5em;
  margin-bottom: 20px;
  color: var(--text);
}
.archive-list { display: flex; flex-direction: column; gap: 18px; }
.archive-week h4 { color: var(--text-secondary); font-size: 1em; margin-bottom: 6px; }
.archive-week ul { list-style: none; padding-left: 12px; }
.archive-week li { padding: 4px 0; }
.archive-week a {
  color: var(--accent-1);
  text-decoration: none;
  font-size: 0.93em;
}
.archive-week a:hover { text-decoration: underline; color: #8b9cf7; }
.empty { color: var(--text-secondary); font-style: italic; }

/* Footer */
.footer {
  text-align: center;
  padding: 30px;
  color: var(--text-secondary);
  font-size: 0.85em;
  border-top: 1px solid var(--border);
  margin-top: 40px;
}

/* Responsive */
@media (max-width: 768px) {
  .hero h1 { font-size: 1.6em; }
  .module-header { flex-direction: column; text-align: center; padding: 20px; }
  .module-body { padding: 16px; }
  .item { padding: 12px 14px; }
  .container { padding: 12px; }
}
</style>
</head>
<body>

<!-- Hero -->
<header class="hero">
  <h1>应天周报 · 抗衰老情报</h1>
  <p class="subtitle">无限极延衰领域 · 学术前沿 + 产业进展 + AI交叉 · 每周更新</p>
  <div class="date-badge">📅 {{date}} · {{week}}</div>
</header>

  <div class="archive-section">
    <h2>📚 往期归档</h2>

</div>

<footer class="footer">
  <p>应天AI研发系统 · 无限极全球科研中心 | 自动生成于 {{date}}</p>
  <p style="margin-top:4px;font-size:0.8em;">基于 PubMed · Web · arXiv 公开信息 | 仅供研究参考</p>
</footer>

</body>
</html>
